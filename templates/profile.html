<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AURA AI | Profile Setup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-page">

<div class="login-container">

    <div class="login-card" style="max-width:700px; width:100%;">

        <div class="text-center mb-4">

            <div class="logo">
                <i class="bi bi-person-vcard-fill"></i>
            </div>

            <h2>AURA AI</h2>

            <p>Complete your fitness profile</p>

        </div>

        <form action="/recommend" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-control">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Fitness Goal</label>
                    <select name="goal" class="form-control">
                        <option>Weight Loss</option>
                        <option>Muscle Gain</option>
                        <option>Maintain Fitness</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Height (cm)</label>
                    <input type="number" step="0.1" name="height" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Weight (kg)</label>
                    <input type="number" step="0.1" name="weight" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Activity Level</label>
                    <select name="activity" class="form-control">
                        <option>Sedentary</option>
                        <option>Lightly Active</option>
                        <option>Moderately Active</option>
                        <option>Very Active</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Food Preference</label>
                    <select name="food" class="form-control">
                        <option>Vegetarian</option>
                        <option>Non-Vegetarian</option>
                        <option>Vegan</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Sleep (Hours)</label>
                    <input type="number" name="sleep" class="form-control" min="1" max="12">
                </div>

                <div class="col-md-6 mb-4">
                    <label>Water Intake (Litres)</label>
                    <input type="number" step="0.5" name="water" class="form-control">
                </div>

            </div>

            <button type="submit" class="btn login-btn w-100">
                Generate My AI Fitness Plan
            </button>

        </form>

    </div>

</div>

</body>
</html>
